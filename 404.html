<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — not found</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .notfound {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 7rem 1.5rem;
    }
    .notfound h1 {
      font-size: 2rem;
      margin: 0 0 0.5rem;
    }
  </style>
</head>
<body>
  <div class="notfound">
    <h1>404 <span class="cursor" aria-hidden="true">|</span></h1>
    <p class="tagline">this page wandered off.</p>
    <p class="links big"><a href="/">← home</a></p>
  </div>
</body>
</html>
